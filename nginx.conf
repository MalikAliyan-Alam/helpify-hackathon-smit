server {
    # Cloud Run requires the container to listen on port 8080
    listen 8080;
    server_name localhost;

    # Where the built React app is served from
    root /usr/share/nginx/html;
    index index.html;

    # Handle React Router client-side routing
    # This ensures that if a file or directory isn't found, it falls back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Serve a custom error page
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
